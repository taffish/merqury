[package]
name = "merqury"
kind = "tool"
version = "1.3"
release = 1
license = "Public Domain"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["genome-assembly", "quality-control", "phasing", "kmer", "visualization"]
keywords = ["merqury", "meryl", "k-mer", "assembly-evaluation", "QV", "completeness", "hap-mer", "phasing", "spectra-cn"]
description = "Merqury evaluates genome assemblies with k-mer spectra, QV, completeness, and phasing statistics."

[repository]
url = "https://github.com/taffish/merqury"

[command]
name = "taf-merqury"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/merqury:1.3-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64"

[upstream]
name = "Merqury"
type = "github"
repo = "marbl/merqury"
homepage = "https://github.com/marbl/merqury"
release_url = "https://github.com/marbl/merqury/releases/tag/v1.3"
downloads = "https://github.com/marbl/merqury/archive/refs/tags/v1.3.tar.gz"
version = "1.3"
license = "Public Domain"
citation = "Rhie et al. 2020"
doi = "10.1186/s13059-020-02134-9"
pmid = "32928274"
watch = "github-releases"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 300
exist = ["merqury.sh", "merqury", "best_k.sh", "qv.sh", "spectra-cn.sh", "plot_spectra_cn.R", "meryl", "meryl-lookup", "Rscript", "java", "bedtools", "samtools", "pigz", "bash"]
test = ["test \"$(cat /usr/local/share/doc/merqury/VERSION)\" = '1.3'", "test \"$(cat /usr/local/share/doc/merqury/MERYL_VERSION)\" = '1.4.1'", "test \"$MERQURY\" = '/opt/merqury' && test -x \"$MERQURY/merqury.sh\"", "merqury.sh 2>&1 | grep -F 'Usage: merqury.sh' >/dev/null", "best_k.sh 1000000 2>&1 | grep -E '^14\\.' >/dev/null", "meryl -h 2>&1 | grep -F 'COMMANDS:' >/dev/null", "meryl-lookup 2>&1 | grep -F 'usage:' >/dev/null", "Rscript -e 'library(argparse); library(ggplot2); library(scales)'", "plot_spectra_cn.R --help 2>&1 | grep -F 'spectra-cn plots' >/dev/null", "java -version >/dev/null 2>&1 && bedtools --version >/dev/null && samtools --version >/dev/null && pigz --version >/dev/null", "mkdir -p /tmp/taf-merqury-smoke && cd /tmp/taf-merqury-smoke && printf '>toy\\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\\n' > asm.fa && meryl k=21 memory=0.1 count asm.fa output read.meryl >/dev/null 2> meryl.log && test -d read.meryl && merqury.sh read.meryl asm.fa out > run.out 2> run.err && test -s out.qv && test -s out.completeness.stats && test -s out.asm.spectra-cn.ln.png && test -s out.spectra-asm.ln.png && test -e asm_only.wig && grep -F 'asm_only.wig generated.' logs/out.spectra-cn.log >/dev/null && grep -F 'Done!' logs/out.spectra-cn.log >/dev/null"]
